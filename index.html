  <style>
    body {

    }
    
    .neon-text-cyan { text-shadow: 0 0 10px rgba(0, 240, 255, 0.8); }
    .neon-text-gold { text-shadow: 0 0 10px rgba(255, 215, 0, 0.8); }
    
    .cyber-border {
      border: 1px solid rgba(0, 240, 255, 0.3);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }
    .cyber-border:hover {
      border-color: rgba(0, 240, 255, 0.8);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      20% { opacity: 0.5; }
      80% { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
    .mahjong-tile {
      position: absolute;
      top: -10vh;
      display: inline-block;
      user-select: none;
      pointer-events: none;
      animation: fall linear infinite;
      z-index: 1;
      font-family: "Noto Sans SC", "Noto Sans JP", sans-serif;
    }
    
    .mahjong-tile svg {
      display: block;
      width: 10%;
      height: 10%;
      overflow: visible;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0a0a16; }
    ::-webkit-scrollbar-thumb { background: #b026ff; border-radius: 4px; }

    .page-section {
      display: none;
      animation: fadeIn 0.5s ease-out;
    }
    .page-section.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .nav-btn {
      position: relative;
      transition: all 0.3s ease;
    }
    .nav-btn.active {
      color: #00f0ff;
    }
    .nav-btn.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      right: 0;
      height: 2px;
      background: #00f0ff;
      box-shadow: 0 0 10px #00f0ff;
    }
  </style>

    function switchPage(pageId) {
      document.querySelectorAll('.page-section').forEach(section => {
        section.classList.remove('active');
      });
      
      const targetPage = document.getElementById('page-' + pageId);
      if (targetPage) {
        targetPage.classList.add('active');
        currentPage = pageId;
      }
      
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      const activeBtn = document.getElementById('nav-' + pageId);
      if (activeBtn) activeBtn.classList.add('active');
      
      document.getElementById('mobile-menu').classList.add('hidden');
      window.scrollTo(0, 0);
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
    }

    function updateDOMText() {
      // 更新网页头部 <title> 标签
      document.title = i18nConfig["page.title"][currentLang];
      // 更改 HTML 语言属性，利于浏览器翻译与 SEO
      document.documentElement.lang = currentLang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18nConfig[key]) el.innerHTML = i18nConfig[key][currentLang];
      });
      
      document.getElementById('lang-toggle').innerText = currentLang === 'zh' ? '日本語' : '中文';
      const mobileToggle = document.getElementById('lang-toggle-mobile');
      if (mobileToggle) mobileToggle.innerText = currentLang === 'zh' ? '日本語' : '中文';
      renderChampionSection();
    }

    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'ja' : 'zh';
      updateDOMText();
      
      // 需求1: 切换语言时，动态更新网址后缀，以便用户随时复制分享
      const newUrl = new URL(window.location);
      newUrl.searchParams.set('lang', currentLang);
      window.history.pushState({}, '', newUrl);
    }

      `;
    }

    async function initMahjongBackground() {
      const container = document.getElementById('bg-canvas');
      if (!container) return;
      try {
        const res = await fetch('./images/panel.color.svg');
        const svgText = await res.text();
        const div = document.createElement('div');
        div.style.display = 'none';
        div.innerHTML = svgText;
        document.body.prepend(div);
      } catch (e) {
        console.error('加载 SVG 失败:', e);
        return;
      }
      const tileMap = {
        '🀀': 'ton', '🀁': 'nan', '🀂': 'xia', '🀃': 'pei',
        '🀄': 'chun', '🀅': 'hatsu', '🀆': 'haku',
        '🀇': '1man', '🀈': '2man', '🀉': '3man',
        '🀊': '4man', '🀋': '5man', '🀌': '6man',
        '🀍': '7man', '🀎': '8man', '🀏': '9man',
        '🀐': '1sou', '🀑': '2sou', '🀒': '3sou',
        '🀓': '4sou', '🀔': '5sou', '🀕': '6sou',
        '🀖': '7sou', '🀗': '8sou', '🀘': '9sou',
        '🀙': '1pin', '🀚': '2pin', '🀛': '3pin',
        '🀜': '4pin', '🀝': '5pin', '🀞': '6pin',
        '🀟': '7pin', '🀠': '8pin', '🀡': '9pin'
      };
      const tiles = Object.keys(tileMap);
      const isMobile = window.innerWidth < 768; 
      const count = isMobile ? 14 : 25;         
      const svgNS = 'http://www.w3.org/2000/svg';

      for (let i = 0; i < count; i++) {
        const tileChar = tiles[Math.floor(Math.random() * tiles.length)];
        const targetId = tileMap[tileChar];

        const wrapper = document.createElement('span');
        wrapper.className = 'mahjong-tile';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('viewBox', '0 0 300 400');
        svg.style.width = '100%';
        svg.style.height = '100%';
        svg.style.display = 'block';

        const use = document.createElementNS(svgNS, 'use');
        use.setAttribute('href', `#${targetId}`);

        svg.appendChild(use);
        wrapper.appendChild(svg);

        const left = Math.random() * 100;
        const size = 1 + Math.random() * 2;
        const duration = 15 + Math.random() * 25;
        const delay = Math.random() * -30;

        wrapper.style.left = `${left}vw`;
        wrapper.style.width = `${size * 0.75}rem`;
        wrapper.style.height = `${size}rem`;
        wrapper.style.animationDuration = `${duration}s`;
        wrapper.style.animationDelay = `${delay}s`;

        container.appendChild(wrapper);
      }
    }

    // 获取默认的显示文本（中文）

      return (i18nConfig[key] && i18nConfig[key].zh) ? i18nConfig[key].zh : key;

    // 创建单元格辅助函数
    function createCell(text, noI18n = false) {
      const cell = document.createElement('div');
      cell.className = 'px-3 py-3 border-b border-white/5 min-w-0 break-words';
      if (!noI18n && text) {
        cell.textContent = text;
      } else {
        cell.textContent = text;
      }
      return cell;
    }

    // 建立一个队伍卡片
    function buildTeamCard(team) {
      const cardDiv = document.createElement('div');
      cardDiv.className = 'bg-white/5 rounded-2xl p-8 cyber-border max-w-[70rem] mx-auto mb-8';

      // 头部（队名+队徽占位）
      const headerDiv = document.createElement('div');
      headerDiv.className = 'flex flex-col md:flex-row items-center gap-8 mb-8';
      headerDiv.innerHTML = `
        <img src="${team.logo || ' '}" alt="" class="w-32 h-32 object-contain bg-black/30 rounded-lg p-2 border border-cyber-cyan/50">
        <div class="text-center md:text-left">
          <h3 class="text-3xl font-cyber font-bold text-white mb-2" data-i18n="teams.${team.teamKey}.desc">${team.name.zh}</h3>
          <p data-i18n="teams.${team.teamKey}.info" class="text-gray-400 text-sm italic">${team.info.zh}</p>
        </div>
      `;

      // 表格容器
      const tableWrapper = document.createElement('div');
      tableWrapper.className = 'overflow-x-auto rounded-lg border border-white/10';
      const grid = document.createElement('div');
      grid.className = 'grid grid-cols-[100px_1.2fr_1.1fr_1fr_1.2fr_1.6fr_1fr_1.6fr] text-sm text-gray-300 min-w-[60rem]';

      // 表头（带 i18n）
      const headerCells = [
        { style: 'flex items-center justify-center', html: '<i class="fa-solid fa-image"></i>' },
        { text: '昵称', key: 'table.col.nickname' },
        { text: '位置', key: 'table.col.role' },
        { text: '身份', key: 'table.col.status' },
        { text: '最高段位', key: 'table.col.highestRank' },
        { text: '雀魂玩家名', key: 'table.col.playerName' },
        { text: '喜欢役种', key: 'table.col.favoriteYaku' },
        { text: '爱好', key: 'table.col.hobby' }
      ];
      headerCells.forEach(cell => {
        const div = document.createElement('div');
        div.className = 'bg-gray-800/50 text-cyber-cyan px-3 py-3 min-w-0 break-words';
        if (cell.style) {
          cell.style.split(' ').forEach(cls => div.classList.add(cls));
        }
        if (cell.key) {
          div.setAttribute('data-i18n', cell.key);
          div.textContent = cell.text;
        } else {
          div.innerHTML = cell.html;
        }
        grid.appendChild(div);
      });

      // 队员行
      if (!team.players || team.players.length === 0) {
        const emptyRow = document.createElement('div');
        emptyRow.className = 'px-3 py-3 col-span-8 text-center text-gray-500 border-b border-white/5';
        emptyRow.setAttribute('data-i18n', 'teams.noData');
        emptyRow.textContent = getI18nDefault('teams.noData') || '暂无数据';
        grid.appendChild(emptyRow);
      } else {
        team.players.forEach(player => {
          // 头像
          const avatarCell = document.createElement('div');
          avatarCell.className = 'px-3 py-3 flex items-center justify-center border-b border-white/5';
          if (player.avatar) {
            avatarCell.innerHTML = `<div class="w-16 h-16 rounded-full bg-gray-700 overflow-hidden">
              <img src="${player.avatar}" alt="avatar" fetchpriority="low" decoding="async" class="w-full h-full object-cover">
            </div>`;
          } else {
            avatarCell.innerHTML = `<div class="w-16 h-16 rounded-full bg-gray-700 flex items-center justify-center text-xs"></div>`;
          }

          // 昵称（硬编码，不翻译）
          const nicknameCell = createCell(player.nickname);
          
          // 角色（Captain/Member 不翻译）
          const roleCell = createCell(player.role);
          
          // 身份（i18n）
          const statusCell = document.createElement('div');
          statusCell.className = 'px-3 py-3 border-b border-white/5 min-w-0 break-words';
          statusCell.innerHTML = `<span data-i18n="${player.statusKey}">${getI18nDefault(player.statusKey)}</span>`;
          
          // 段位（i18n）
          const rankCell = document.createElement('div');
          rankCell.className = 'px-3 py-3 border-b border-white/5 min-w-0 break-words';
          rankCell.innerHTML = `<span data-i18n="${player.rankKey}">${getI18nDefault(player.rankKey)}</span>`;
          
          // 玩家名（硬编码）
          const playerNameCell = createCell(player.playerName);
          
          // 役种（i18n）
          const yakuCell = document.createElement('div');
          yakuCell.className = 'px-3 py-3 border-b border-white/5 min-w-0 break-words';
          if (player.yakuKey) {
            yakuCell.innerHTML = `<span data-i18n="${player.yakuKey}">${getI18nDefault(player.yakuKey)}</span>`;
          }
          
          // 爱好（硬编码，不翻译）
          const hobbyCell = createCell(player.hobby || '');

          grid.appendChild(avatarCell);
          grid.appendChild(nicknameCell);
          grid.appendChild(roleCell);
          grid.appendChild(statusCell);
          grid.appendChild(rankCell);
          grid.appendChild(playerNameCell);
          grid.appendChild(yakuCell);
          grid.appendChild(hobbyCell);
        });
      }

      tableWrapper.appendChild(grid);
      cardDiv.appendChild(headerDiv);
      cardDiv.appendChild(tableWrapper);
      return cardDiv;
    }

    // 加载并渲染所有队伍
    async function loadTeams() {
      const container = document.getElementById('teams-container');
      if (!container) return;
      try {
        const response = await fetch('./data/teams.json');
        const teams = await response.json();
        teams.forEach(team => {
          const card = buildTeamCard(team);
          container.appendChild(card);
        });
        // 初始显示语言
        const savedLang = localStorage.getItem('lang') || 'zh';
        updateDOMText();
      } catch (error) {
        console.error('加载队伍数据失败:', error);
        container.innerHTML = '<p class="text-center text-red-400">队伍数据加载失败，请检查 data/teams.json 文件。</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', async() => {
      // 需求1: 读取 URL 中的参数。如果有 ?lang=ja 则加载日语版
      const params = new URLSearchParams(window.location.search);
      const langParam = params.get('lang');
      if (langParam === 'ja' || langParam === 'zh') {
        currentLang = langParam;
      }
      await loadTeams();
      updateDOMText();
      initMahjongBackground();
      switchPage('info');
    });
  </script>
</body>
</html>
